<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Admin - Historial de Viajes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-mode="admin">

    <header>
        <div class="title" id="cliente-nombre">Cargando...</div>
        <div class="subtitle">Panel de Admnistración</div>
    </header>

    <main class="container">
        
        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-title">Acreditado</span>
                <span class="stat-value paid" id="total-paid">$0.00</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">Pendiente</span>
                <span class="stat-value pending" id="total-pending">$0.00</span>
            </div>
        </div>

        <div id="historial-list" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 5rem;">
            <div class="loader"></div>
        </div>

    </main>

    <div class="admin-actions">
        <button class="btn-floating" onclick="downloadJson()">
            💾 Guardar JSON
        </button>
    </div>

    <!-- Modal for Success Message -->
    <div class="modal-overlay" id="success-modal">
        <div class="modal">
            <h3>✅ Archivo Generado</h3>
            <p>Se ha descargado el nuevo archivo <strong>data.js</strong>.</p>
            <p>Para actualizar los datos en vivo, asegúrate de reemplazar el archivo existente en tu carpeta y subir los cambios a Git.</p>
            <div class="modal-actions">
                <button class="btn-primary" onclick="closeModal()">Entendido</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
